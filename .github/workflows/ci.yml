name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.0"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linters
        run: scripts/lint

      - name: Run tests
        run: scripts/test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.58"

      - name: Install pyodide-build
        run: pip install pyodide-build>=0.27.0

      - name: Build pyodide wheel
        run: pyodide build

      - name: Copy wheel to pyodide-dist
        run: |
          mkdir -p pyodide-dist
          cp dist/*.whl pyodide-dist/
          cp dist/*.tar.gz pyodide-dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: pyodide_wheel
          path: pyodide-dist

  pyodide:
    needs: build
    runs-on: ubuntu-latest
    env:
      DISPLAY: :99
      FORCE_COLOR: 3
    steps:
      - uses: actions/checkout@v4

      - uses: pyodide/pyodide-actions/download-pyodide@v2
        with:
          version: "0.27.2"
          to: pyodide-dist

      - uses: pyodide/pyodide-actions/install-browser@v2
        with:
          runner: selenium
          browser: firefox

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pyodide_wheel
          path: pyodide-dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyodide-py
        run: pip install pyodide-py==0.27.2

      - name: Install pytest-pyodide
        run: pip install pytest-pyodide

      - name: Run tests
        run: |
          python -m pytest -vra \
            --dist-dir=./pyodide-dist/ \
            --runner=selenium \
            --rt=firefox \
            pyodide_tests