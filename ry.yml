version: 1

defaults:
  include:
    - package: std
    - package: zapros-public
    - package: zapros-internal

packages:
  zapros-public:
    rules:
      - id: async-client
        kind: regex
        match: '\bAsyncClient\b'
        replace: 'Client'

      - id: async-base-handler
        kind: regex
        match: '\bAsyncBaseHandler\b'
        replace: 'BaseHandler'

      - id: async-base-middleware
        kind: regex
        match: '\bAsyncBaseMiddleware\b'
        replace: 'BaseMiddleware'

      - id: async-iter-bytes
        kind: regex
        match: '\basync_iter_bytes\b'
        replace: 'iter_bytes'

      - id: async-iter-text
        kind: regex
        match: '\basync_iter_text\b'
        replace: 'iter_text'

      - id: async-iter-raw
        kind: regex
        match: '\basync_iter_raw\b'
        replace: 'iter_raw'

      - id: async-iter-next
        kind: regex
        match: '\basync_iter_next\b'
        replace: 'iter_next'

      - id: aclose
        kind: regex
        match: '\baclose\b'
        replace: 'close'

      - id: aread
        kind: regex
        match: '\baread\b'
        replace: 'read'

  zapros-internal:
    rules:
      - kind: regex
        match: '\bahandle\b'
        replace: 'handle'

      - kind: regex
        match: '\bensure_async_handler\b'
        replace: 'ensure_sync_handler'

      - kind: regex
        match: '\baconnect\b'
        replace: 'connect'

      - kind: regex
        match: '\baconnect_tcp\b'
        replace: 'connect_tcp'

      - kind: regex
        match: '\basync_next\b'
        replace: 'next'

      - kind: regex
        match: '\bhandle_async_request\b'
        replace: 'handle_request'

      - kind: regex
        match: '\bwrap_with_async_middleware\b'
        replace: 'wrap_with_middleware'

      - kind: regex
        match: '\bAsyncPyreqwestHandler\b'
        replace: 'PyreqwestHandler'

      - kind: regex
        match: '\bAsyncStdNetworkHandler\b'
        replace: 'StdNetworkHandler'

      - kind: regex
        match: '\bAsyncIterable\b'
        replace: 'Iterable'

      - kind: regex
        match: '\bAsyncIdlePoolConnection\b'
        replace: 'IdlePoolConnection'

      - kind: regex
        match: '\bAsyncPoolConnection\b'
        replace: 'PoolConnection'

      - kind: regex
        match: '\bAsyncClosableStream\b'
        replace: 'ClosableStream'

      - kind: regex
        match: '\bAsyncBaseNetworkStream\b'
        replace: 'BaseNetworkStream'

      - kind: regex
        match: '\bAsyncBaseTransport\b'
        replace: 'BaseTransport'

      - kind: regex
        match: '\bAsyncConnPool\b'
        replace: 'ConnPool'

      - kind: regex
        match: '\bAsyncConn\b'
        replace: 'Conn'

      - kind: regex
        match: '\bAsyncPyreqwestStream\b'
        replace: 'PyreqwestStream'

      - kind: regex
        match: '\bAsyncStdStream\b'
        replace: 'StdStream'

      - kind: regex
        match: '\bAsyncStream\b'
        replace: 'Stream'

      - kind: regex
        match: '\b_async_iter_source\b'
        replace: '_iter_source'

      - kind: regex
        match: '\bAsyncPyodideHandler\b'
        replace: 'PyodideHandler'

      - kind: regex
        match: '\bAsyncIOTransport\b'
        replace: 'SyncTransport'

      - kind: regex
        match: 'from zapros\._io\._asyncio import SyncTransport'
        replace: 'from zapros._io._sync import SyncTransport'

      - kind: regex
        match: 'zapros\._async_io'
        replace: 'zapros._sync_io'

      - kind: regex
        match: '\._async_io'
        replace: '._sync_io'

      - kind: regex
        match: 'zapros\._async_base'
        replace: 'zapros._sync_base'

      - kind: regex
        match: '\._async_base'
        replace: '._sync_base'

      - kind: regex
        match: 'zapros\._async_pool'
        replace: 'zapros._sync_pool'

      - kind: regex
        match: '\._async_pool'
        replace: '._sync_pool'

      - kind: regex
        match: 'self\._wait_with_timeout\((.*)\)'
        replace: 'self._cond.wait($1)'

      - kind: regex
        match: '\bClientBuilder\b'
        replace: 'SyncClientBuilder'

      - kind: regex
        match: 'from pyreqwest\.response import Response as PyreqwestResponse'
        replace: 'from pyreqwest.response import SyncResponse as PyreqwestResponse'

      - kind: regex
        match: 'Response as PyreqwestResponse'
        replace: 'SyncResponse as PyreqwestResponse'

      - kind: regex
        match: '\bpytest_asyncio\b'
        replace: 'pytest'

      - kind: regex
        match: '\bmock_server\b'
        replace: 'mock_server'

      - kind: regex
        match: '\basync_mock_builder\b'
        replace: 'mock_builder'

      - kind: regex
        match: 'MockAsyncConnection'
        replace: 'MockConnection'

      - kind: regex
        match: '\bAsyncMockServer\b'
        replace: 'MockServer'

targets:
  - input: src/zapros/_handlers/_async_base.py
    output: src/zapros/_handlers/_sync_base.py

  - input: src/zapros/_handlers/_async_pyreqwest.py
    output: src/zapros/_handlers/_sync_pyreqwest.py

  - input: src/zapros/_handlers/_async_std.py
    output: src/zapros/_handlers/_sync_std.py

  - input: src/zapros/_async_client.py
    output: src/zapros/_sync_client.py

  - input: src/zapros/_async_pool.py
    output: src/zapros/_sync_pool.py
    rules:
      - kind: regex
        match: '\bfrom ._compat import AnyLock\b'
        replace: 'from threading import Lock'
      - kind: regex
        match: '\bfrom ._compat import AnyLock, AnySemaphore\b'
        replace: 'from threading import Lock, Semaphore'
      - kind: regex
        match: '\bAnyLock\b'
        replace: 'Lock'
      - kind: regex
        match: '\bAnySemaphore\b'
        replace: 'Semaphore'

  - input: tests/handlers/test_async_basic.py
    output: tests/handlers/test_sync_basic.py

  - input: tests/handlers/test_async_proxy.py
    output: tests/handlers/test_sync_proxy.py

  - input: tests/test_async_pool.py
    output: tests/test_sync_pool.py
    rules:
      - kind: regex
        match: '\bfrom zapros._compat import anysleep\b'
        replace: 'from time import sleep'
      - kind: regex
        match: '\banysleep\b'
        replace: 'sleep'


  - input: tests/test_async_auth.py
    output: tests/test_sync_auth.py

  - input: tests/handlers/test_async_cassette.py
    output: tests/handlers/test_sync_cassette.py

  - input: tests/handlers/test_async_caching.py
    output: tests/handlers/test_sync_caching.py
    rules:
      - kind: regex
        match: '\banysqlite\b'
        replace: 'sqlite3'
      - kind: regex
        match: '\bAsyncSqliteStorage\b'
        replace: 'SyncSqliteStorage'

  - tag: cassetteMiddleware
    rules:
      - kind: regex
        match: '\b_amaterialize_request\b'
        replace: '_materialize_request'

  - tag: retryMiddleware
    rules:
      - kind: regex
        match: '\banysleep\b'
        replace: 'time.sleep'

  - tag: cacheMiddleware
    rules:
      # TODO: adopt ry in Hishel and import it's rules here instead of duplicating them
      - kind: regex
        match: '_get_async_cache_proxy'
        replace: '_get_sync_cache_proxy'
      - kind: regex
        match: '\bAsyncCacheProxy\b'
        replace: 'SyncCacheProxy'
      - kind: regex
        match: '\b_async_send_request\b'
        replace: '_sync_send_request'
      - kind: regex
        match: '\bHishelAsyncBaseStorage\b'
        replace: 'HishelSyncBaseStorage'